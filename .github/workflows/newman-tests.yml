name: API Test Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and HTML reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run Postman collection with Newman
        env:
          GOREST_TOKEN: ${{ secrets.GOREST_TOKEN }}
        run: |
          newman run collection/GoRest_API_Collection.json \
            -e environment/GoRest_Environment.json \
            --env-var "token=$GOREST_TOKEN" \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/ci-test-report.html

      - name: Upload test report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/ci-test-report.html